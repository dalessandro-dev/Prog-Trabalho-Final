<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cadastre-se na PetCare e ofereça o melhor cuidado para o seu pet.">
  <title>Cadastro | PetCare</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Design System & Page CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body class="bg-gray-50">

  <div class="auth-wrapper py-16">
    <a href="../index.html" class="logo mb-8">
      <i class="ph-fill ph-paw-print"></i> Pet<span>Care</span>
    </a>

    <div class="auth-card auth-card-large">
      <div class="text-center mb-8">
        <h2>Junte-se à família PetCare</h2>
        <p class="text-muted">Crie sua conta e agende o melhor para o seu amigo.</p>
      </div>
      
      <!-- novalidate desativa o tooltip nativo do browser para usarmos o nosso -->
      <form id="register-form" novalidate>
        
        <!-- =======================
             SEÇÃO: DADOS DO TUTOR
             ======================= -->
        <fieldset class="form-fieldset">
          <legend><i class="ph-fill ph-user"></i> Dados do Tutor</legend>
          
          <div class="grid-2-col">
            <!-- Nome -->
            <div class="form-group">
              <label class="form-label" for="name">Nome Completo *</label>
              <div class="input-with-icon">
                <i class="ph ph-user"></i>
                <input type="text" id="name" name="name" class="form-input" placeholder="João da Silva">
              </div>
              <div class="error-text" id="error-name"></div>
            </div>

            <!-- CPF -->
            <div class="form-group">
              <label class="form-label" for="cpf">CPF *</label>
              <div class="input-with-icon">
                <i class="ph ph-identification-card"></i>
                <input type="text" id="cpf" name="cpf" class="form-input" placeholder="Apenas números" maxlength="14">
              </div>
              <div class="error-text" id="error-cpf"></div>
            </div>
          </div>

          <div class="grid-2-col">
            <!-- E-mail -->
            <div class="form-group">
              <label class="form-label" for="email">E-mail *</label>
              <div class="input-with-icon">
                <i class="ph ph-envelope"></i>
                <input type="email" id="email" name="email" class="form-input" placeholder="seu@email.com">
              </div>
              <div class="error-text" id="error-email"></div>
            </div>

            <!-- Telefone -->
            <div class="form-group">
              <label class="form-label" for="phone">Telefone (Celular) *</label>
              <div class="input-with-icon">
                <i class="ph ph-phone"></i>
                <input type="tel" id="phone" name="phone" class="form-input" placeholder="(11) 99999-9999">
              </div>
              <div class="error-text" id="error-phone"></div>
            </div>
          </div>

          <div class="grid-2-col">
            <!-- Cidade -->
            <div class="form-group">
              <label class="form-label" for="city">Cidade *</label>
              <div class="input-with-icon">
                <i class="ph ph-buildings"></i>
                <input type="text" id="city" name="city" class="form-input" placeholder="São Paulo - SP">
              </div>
              <div class="error-text" id="error-city"></div>
            </div>

            <!-- Endereço -->
            <div class="form-group">
              <label class="form-label" for="address">Endereço Completo *</label>
              <div class="input-with-icon">
                <i class="ph ph-map-pin"></i>
                <input type="text" id="address" name="address" class="form-input" placeholder="Rua, Número, Bairro">
              </div>
              <div class="error-text" id="error-address"></div>
            </div>
          </div>

          <div class="grid-2-col">
            <!-- Senha -->
            <div class="form-group">
              <label class="form-label" for="password">Senha *</label>
              <div class="input-with-icon">
                <i class="ph ph-lock-key"></i>
                <input type="password" id="password" name="password" class="form-input" placeholder="Mínimo 6 caracteres">
              </div>
              <div class="error-text" id="error-password"></div>
            </div>

            <!-- Confirmar Senha -->
            <div class="form-group">
              <label class="form-label" for="confirm_password">Confirmar Senha *</label>
              <div class="input-with-icon">
                <i class="ph ph-lock-key"></i>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Repita sua senha">
              </div>
              <div class="error-text" id="error-confirm_password"></div>
            </div>
          </div>
        </fieldset>

        <!-- =======================
             SEÇÃO: DADOS DO PET
             ======================= -->
        <fieldset class="form-fieldset mt-8">
          <legend><i class="ph-fill ph-dog"></i> Dados do Pet</legend>
          
          <div class="grid-2-col">
            <!-- Nome do Pet -->
            <div class="form-group">
              <label class="form-label" for="pet_name">Nome do Pet *</label>
              <div class="input-with-icon">
                <i class="ph ph-tag"></i>
                <input type="text" id="pet_name" name="pet_name" class="form-input" placeholder="Ex: Rex">
              </div>
              <div class="error-text" id="error-pet_name"></div>
            </div>

            <!-- Espécie -->
            <div class="form-group">
              <label class="form-label" for="pet_species">Espécie *</label>
              <div class="input-with-icon">
                <i class="ph ph-cat"></i>
                <select id="pet_species" name="pet_species" class="form-input" style="padding-left: 2.5rem;">
                  <option value="" disabled selected>Selecione</option>
                  <option value="Cachorro">Cachorro</option>
                  <option value="Gato">Gato</option>
                  <option value="Ave">Ave</option>
                  <option value="Outro">Outro</option>
                </select>
              </div>
              <div class="error-text" id="error-pet_species"></div>
            </div>
          </div>

          <div class="grid-2-col">
            <!-- Raça -->
            <div class="form-group">
              <label class="form-label" for="pet_breed">Raça</label>
              <div class="input-with-icon">
                <i class="ph ph-dna"></i>
                <input type="text" id="pet_breed" name="pet_breed" class="form-input" placeholder="Ex: Poodle (opcional)">
              </div>
              <div class="error-text" id="error-pet_breed"></div>
            </div>

            <!-- Idade -->
            <div class="form-group">
              <label class="form-label" for="pet_age">Idade *</label>
              <div class="input-with-icon">
                <i class="ph ph-calendar"></i>
                <input type="text" id="pet_age" name="pet_age" class="form-input" placeholder="Ex: 2 anos">
              </div>
              <div class="error-text" id="error-pet_age"></div>
            </div>
          </div>

          <!-- Observações -->
          <div class="form-group mt-2">
            <label class="form-label" for="pet_notes">Observações e Histórico Médico</label>
            <div class="input-with-icon textarea-icon-wrapper">
              <i class="ph ph-file-text"></i>
              <textarea id="pet_notes" name="pet_notes" class="form-input form-textarea" rows="4" placeholder="Alergias, medicamentos contínuos, ou comportamento (opcional)"></textarea>
            </div>
            <div class="error-text" id="error-pet_notes"></div>
          </div>
        </fieldset>

        <div id="form-general-error" class="error-container" style="display: none; padding: 1rem; margin-bottom: 1rem;">
          Por favor, corrija os erros destacados acima antes de enviar.
        </div>

        <button type="submit" class="btn btn-primary auth-submit-btn mt-6" id="submit-btn">
          Criar Minha Conta
        </button>
      </form>

      <p class="auth-redirect">
        Já tem uma conta? <a href="login.html">Faça login</a>
      </p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/services/api.js"></script>
  <script src="../js/pages/auth.js"></script>
</body>
</html>
